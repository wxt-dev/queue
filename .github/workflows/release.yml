name: Release
on:
  workflow_dispatch:

jobs:
  validate:
    uses: "./.github/workflows/validate.yml"

  publish:
    runs-on: ubuntu-22.04
    needs:
      - validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Bump and Tag
        id: bump
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "GitHub Actions"
          bunx changelogen@latest --release
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git push
          git push --tags

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: aklinker1/store-api
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.bump.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.bump.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Production Deployment
        run: |
          curl -X POST -i -H 'X-API-Key: ${{ secrets.UPDATE_PROD_WEBHOOK_API_KEY }}' ${{ secrets.UPDATE_PROD_WEBHOOK }}

      - name: GitHub Release
        run: bunx changelogen@latest gh release --token ${{ secrets.GITHUB_TOKEN }}
